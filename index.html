<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareFlow Pro — Client-Ready Care Home Demo</title>
<style>
:root{
  --bg0:#030712;
  --bg1:#07162b;
  --bg2:#0b2142;
  --glass:rgba(255,255,255,.078);
  --glass-strong:rgba(10,27,54,.84);
  --glass-soft:rgba(255,255,255,.045);
  --border:rgba(255,255,255,.14);
  --border-bright:rgba(61,220,255,.34);
  --text:#eef8ff;
  --muted:#9fb6d6;
  --cyan:#3ddcff;
  --blue:#4f7cff;
  --violet:#8b5cf6;
  --green:#56f0a7;
  --amber:#ffbd59;
  --red:#ff7f9a;
  --shadow:0 28px 90px rgba(0,0,0,.38);
  --radius:24px;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 12% 0%,rgba(79,124,255,.42),transparent 32%),
    radial-gradient(circle at 86% 8%,rgba(61,220,255,.24),transparent 30%),
    radial-gradient(circle at 50% 100%,rgba(139,92,246,.20),transparent 36%),
    linear-gradient(135deg,var(--bg0),var(--bg1) 55%,var(--bg2));
  overflow-x:hidden;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.75),transparent 82%);
}
button,input,select,textarea{font:inherit}
button{
  cursor:pointer;
  border:0;
  color:#fff;
  border-radius:14px;
  padding:11px 14px;
  background:linear-gradient(135deg,var(--blue),var(--cyan));
  box-shadow:0 12px 34px rgba(61,220,255,.18);
  transition:.18s ease;
}
button:hover{transform:translateY(-1px);filter:brightness(1.08)}
button.secondary{
  background:rgba(255,255,255,.09);
  border:1px solid var(--border);
  box-shadow:none;
}
button.danger{background:linear-gradient(135deg,#ff477e,#ff9a63)}
button.success{background:linear-gradient(135deg,#18b981,#56f0a7)}
button.small{padding:7px 10px;border-radius:10px;font-size:12px}
button.full{width:100%}
input,select,textarea{
  width:100%;
  border:1px solid var(--border);
  background:rgba(6,18,35,.78);
  color:var(--text);
  border-radius:14px;
  padding:11px 12px;
  outline:none;
}
textarea{min-height:110px;resize:vertical}
label{display:block;font-size:12px;color:var(--muted);margin:10px 0 6px}
h1,h2,h3,p{margin-top:0}
p{color:var(--muted);line-height:1.55}
a{color:var(--cyan)}
.topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:400;
  height:64px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:18px;
  padding:10px 18px;
  background:rgba(3,10,21,.72);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border);
}
.brand-mini{display:flex;align-items:center;gap:12px;min-width:0}
.logo-mark{
  width:42px;height:42px;border-radius:16px;
  display:grid;place-items:center;
  color:#051225;font-weight:950;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  box-shadow:0 16px 44px rgba(61,220,255,.25);
}
.brand-mini b{display:block;white-space:nowrap}
.brand-mini span{display:block;color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-switcher{display:flex;align-items:center;gap:10px;min-width:280px}
.session-switcher label{margin:0;white-space:nowrap}
.app-shell{
  display:grid;
  grid-template-columns:300px 1fr;
  min-height:100vh;
  padding-top:64px;
}
.sidebar{
  position:sticky;
  top:64px;
  height:calc(100vh - 64px);
  padding:18px;
  background:rgba(3,10,21,.58);
  backdrop-filter:blur(24px);
  border-right:1px solid var(--border);
  overflow:auto;
}
.main{padding:18px 20px 42px;min-width:0}
.card,.glass{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(22px);
}
.card.soft{box-shadow:none;background:var(--glass-soft)}
.nav button,.tour button{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:8px 0;
  background:transparent;
  border:1px solid transparent;
  box-shadow:none;
  text-align:left;
}
.nav button.active,.tour button.active{
  background:rgba(61,220,255,.12);
  border-color:var(--border-bright);
}
.side-section{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:20px;
  padding:14px;
  margin-bottom:16px;
}
.hero{
  display:grid;
  grid-template-columns:1.2fr .9fr;
  gap:16px;
  margin-bottom:16px;
}
.hero-title{
  font-size:clamp(30px,4vw,56px);
  line-height:1.03;
  margin-bottom:12px;
  letter-spacing:-1.5px;
}
.gradient-text{
  background:linear-gradient(135deg,#fff,var(--cyan),#a8b2ff);
  background-clip: text;
  -webkit-background-clip:text;
  color:transparent;
}
.badge{
  display:inline-flex;
  gap:7px;
  align-items:center;
  padding:5px 10px;
  border-radius:999px;
  background:rgba(61,220,255,.12);
  border:1px solid rgba(61,220,255,.24);
  color:#d1f8ff;
  font-size:12px;
}
.badge.warn{background:rgba(255,189,89,.12);border-color:rgba(255,189,89,.28);color:#ffe1aa}
.badge.bad{background:rgba(255,127,154,.12);border-color:rgba(255,127,154,.34);color:#ffc4d0}
.badge.good{background:rgba(86,240,167,.12);border-color:rgba(86,240,167,.30);color:#c7ffe3}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:16px 0}
.kpi{
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:22px;
  padding:16px;
  backdrop-filter:blur(18px);
}
.kpi .num{font-size:32px;font-weight:850;letter-spacing:-1px}
.kpi .label{color:var(--muted);font-size:13px}
.kpi .trend{font-size:12px;margin-top:8px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.item{
  border:1px solid var(--border);
  background:var(--glass-soft);
  border-radius:16px;
  padding:12px;
  margin:10px 0;
}
.item-header{display:flex;justify-content:space-between;gap:12px;align-items:center}
.good{color:var(--green)}.warn-text{color:var(--amber)}.bad-text{color:var(--red)}.cyan{color:var(--cyan)}.muted{color:var(--muted)}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:11px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;font-size:14px;vertical-align:top}
.table th{color:#b9c9e4;font-weight:600}
.progress{height:10px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));border-radius:999px}
.calendar{display:grid;grid-template-columns:repeat(7,minmax(138px,1fr));gap:10px;overflow:auto}
.day{
  min-height:212px;
  background:rgba(255,255,255,.045);
  border:1px solid var(--border);
  border-radius:18px;
  padding:10px;
}
.shift-chip{
  padding:8px;
  border-radius:12px;
  background:rgba(61,220,255,.1);
  border:1px solid rgba(61,220,255,.2);
  margin-top:8px;
  font-size:12px;
  cursor:grab;
  transition:.18s;
}
.shift-chip:hover{transform:translateY(-2px);border-color:rgba(61,220,255,.55)}
.shift-chip.risk{background:rgba(255,127,154,.13);border-color:rgba(255,127,154,.34)}
.dropzone{outline:2px dashed rgba(61,220,255,.45);background:rgba(61,220,255,.08)}
.ai-card{
  background:
    radial-gradient(circle at 0% 0%,rgba(61,220,255,.20),transparent 38%),
    linear-gradient(135deg,rgba(139,92,246,.16),rgba(61,220,255,.08));
  border-color:rgba(139,92,246,.34);
}
.big-alert{border-color:rgba(255,127,154,.45);background:rgba(255,127,154,.10)}
.roi-box{background:linear-gradient(135deg,rgba(86,240,167,.14),rgba(61,220,255,.09));border-color:rgba(86,240,167,.25)}
.export-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px}
.chart{height:210px;display:flex;align-items:end;gap:12px;padding-top:20px}
.bar{flex:1;min-width:18px;background:linear-gradient(180deg,var(--cyan),var(--blue));border-radius:12px 12px 4px 4px;position:relative;opacity:.92}
.bar:after{content:attr(data-label);position:absolute;bottom:-24px;left:50%;transform:translateX(-50%);color:var(--muted);font-size:11px}
.timeline{position:relative;padding-left:18px}
.timeline:before{content:"";position:absolute;left:3px;top:4px;bottom:4px;width:2px;background:rgba(61,220,255,.25)}
.timeline .item{position:relative}
.timeline .item:before{content:"";position:absolute;left:-20px;top:18px;width:10px;height:10px;border-radius:50%;background:var(--cyan);box-shadow:0 0 18px var(--cyan)}
.toast{
  position:fixed;right:18px;bottom:18px;z-index:999;max-width:520px;
  background:rgba(5,13,26,.94);border:1px solid var(--border-bright);
  border-radius:18px;padding:14px 16px;box-shadow:var(--shadow);display:none;
}
.toast.show{display:block;animation:pop .25s ease}
@keyframes pop{from{transform:translateY(12px);opacity:0}to{transform:none;opacity:1}}
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.62);backdrop-filter:blur(10px);
  display:none;align-items:center;justify-content:center;z-index:700;padding:18px;
}
.modal.show{display:flex}
.modal .glass{max-width:900px;width:100%;max-height:90vh;overflow:auto}
.slide{
  min-height:520px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.slide h1{font-size:clamp(34px,5vw,64px);line-height:1.04;letter-spacing:-1.6px}
.pill-row{display:flex;gap:8px;flex-wrap:wrap}
.mobile-tabs{display:none}
.metric-pair{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center}
.arrow{font-size:30px;color:var(--cyan)}
.client-name-card{display:grid;grid-template-columns:1.2fr 1fr auto;gap:10px;align-items:end}
@media(max-width:1180px){
  .app-shell{grid-template-columns:1fr}
  .sidebar{position:relative;top:auto;height:auto}
  .nav,.tour{display:none}
  .mobile-tabs{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}
  .hero,.grid-2,.grid-3,.grid-4,.client-name-card{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .session-switcher{min-width:220px}
}
@media(max-width:680px){
  .topbar{height:auto;align-items:flex-start;flex-direction:column}
  .app-shell{padding-top:126px}
  .main{padding:12px}
  .kpi-grid,.export-row,.metric-pair{grid-template-columns:1fr}
  .calendar{grid-template-columns:1fr}
  .arrow{display:none}
}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand-mini">
    <div class="logo-mark">CF</div>
    <div><b>CareFlow Pro</b><span id="topClientName">Client-ready care home demo</span></div>
  </div>
  <div class="session-switcher">
    <label>Global User Session</label>
    <select id="sessionSelect"></select>
  </div>
</header>

<div class="app-shell">
  <aside class="sidebar">
    <div class="side-section">
      <span class="badge good">Best Client Pitch Version</span>
      <p style="font-size:12px;margin:10px 0 0">Branded dashboard, guided presentation, safe-staffing logic, compliance checks, payroll exports and pilot proposal.</p>
    </div>
    <div class="nav" id="nav"></div>
    <div class="side-section tour" id="tour"></div>
    <div class="side-section">
      <span class="badge">Demo Controls</span>
      <p style="font-size:12px;margin-top:10px">Reset before a new presentation.</p>
      <button class="secondary small full" onclick="resetDemo()">Reset demo data</button>
    </div>
  </aside>
  <main class="main">
    <div id="mobileTabs" class="mobile-tabs"></div>
    <div id="app"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<div class="modal" id="modal">
  <div class="glass">
    <div style="display:flex;justify-content:space-between;gap:16px;align-items:center">
      <h2 id="modalTitle">Details</h2>
      <button class="secondary small" onclick="closeModal()">Close</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
const DB_KEY='careflow_best_client_demo_v1';
const MS_HOUR=36e5;
const users=[
  {name:'Care Manager',admin:true},
  {name:'Sarah Jenkins'},
  {name:'David Vance'},
  {name:'Emily Stone'}
];
const managerTabs=[
  ['command','Command Centre'],
  ['rota','Smart Rota'],
  ['compliance','CQC & Compliance'],
  ['payroll','Payroll'],
  ['proposal','Pilot Proposal']
];
const staffTabs=[
  ['my','My Dashboard'],
  ['clock','Punch Clock'],
  ['requests','Requests']
];
let currentTab='command';
let draggedShiftId=null;
let presentationIndex=0;

function addHours(date,h){return new Date(new Date(date).getTime()+h*MS_HOUR)}
function iso(d){return new Date(d).toISOString()}
function fmt(dt){return new Date(dt).toLocaleString([], {dateStyle:'medium', timeStyle:'short'})}
function dateOnly(dt){return new Date(dt).toLocaleDateString([], {weekday:'short', day:'numeric', month:'short'})}
function timeOnly(dt){return new Date(dt).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
function duration(a,b){return Math.round(((new Date(b)-new Date(a))/MS_HOUR)*100)/100}
function money(n){return '£'+Number(n).toLocaleString(undefined,{maximumFractionDigits:0})}
function daysUntil(expiry){return Math.ceil((new Date(expiry)-new Date())/(24*MS_HOUR))}
function uid(){return Date.now()+Math.floor(Math.random()*1000)}

function seed(){
  if(localStorage.getItem(DB_KEY)) return;
  const now=new Date();
  const base=new Date(now.getFullYear(),now.getMonth(),now.getDate(),7,0,0);
  const db={
    ClientProfile:{
      HomeName:'Rosewood Manor Care Home',
      Location:'Surrey, UK',
      GroupName:'Independent Care Group',
      PresenterNote:'30-day pilot proposal focused on rota safety, agency spend and CQC evidence readiness.'
    },
    Staff:[
      {Id:1,Name:'Sarah Jenkins',Role:'Carer',ContractedHours:37.5,HourlyRate:13.25,TrainingScore:82,DBS:'Clear',Skills:['Residential','Dementia']},
      {Id:2,Name:'David Vance',Role:'Nurse',ContractedHours:37.5,HourlyRate:22.50,TrainingScore:96,DBS:'Clear',Skills:['Nursing','Medication']},
      {Id:3,Name:'Emily Stone',Role:'Senior Carer',ContractedHours:37.5,HourlyRate:16.75,TrainingScore:91,DBS:'Clear',Skills:['Residential','Dementia','Night Team']}
    ],
    Units:[
      {Name:'Residential',Residents:22,Dependency:'Mixed',RequiredCarerRatio:8,RequiredSeniorRatio:16,NurseRequired:false},
      {Name:'Dementia',Residents:9,Dependency:'High',RequiredCarerRatio:5,RequiredSeniorRatio:12,NurseRequired:false},
      {Name:'Nursing',Residents:12,Dependency:'High',RequiredCarerRatio:6,RequiredSeniorRatio:12,NurseRequired:true},
      {Name:'Night Team',Residents:43,Dependency:'Mixed',RequiredCarerRatio:14,RequiredSeniorRatio:43,NurseRequired:true}
    ],
    CareMetrics:{
      Capacity:50,
      Occupied:43,
      HighDependency:11,
      MedicationRoundsToday:128,
      IncidentsOpen:3,
      CallBellAverageMinutes:4.8
    },
    Commercials:{
      CurrentAgencySpend:12840,
      OptimisedAgencySpend:9120,
      PayrollLeakage:1180,
      AdminHoursSavedMonthly:26,
      SuggestedMonthlyPrice:599,
      PilotPrice:399
    },
    ScheduledShifts:[
      {Id:101,StaffId:1,StartTime:iso(base),EndTime:iso(addHours(base,8)),RequiredRole:'Carer',Unit:'Residential',Status:'Published'},
      {Id:102,StaffId:2,StartTime:iso(addHours(base,1)),EndTime:iso(addHours(base,13)),RequiredRole:'Nurse',Unit:'Nursing',Status:'Published'},
      {Id:103,StaffId:3,StartTime:iso(addHours(base,8.5)),EndTime:iso(addHours(base,16.5)),RequiredRole:'Senior Carer',Unit:'Residential',Status:'Published'},
      {Id:104,StaffId:1,StartTime:iso(addHours(base,25)),EndTime:iso(addHours(base,33)),RequiredRole:'Carer',Unit:'Residential',Status:'Published'},
      {Id:105,StaffId:2,StartTime:iso(addHours(base,49)),EndTime:iso(addHours(base,61)),RequiredRole:'Nurse',Unit:'Nursing',Status:'Published'},
      {Id:106,StaffId:3,StartTime:iso(addHours(base,73)),EndTime:iso(addHours(base,81)),RequiredRole:'Senior Carer',Unit:'Dementia',Status:'Published'}
    ],
    TimesheetEntries:[
      {Id:201,StaffId:1,ScheduledShiftId:101,ActualClockIn:iso(addHours(base,.08)),ActualClockOut:iso(addHours(base,8.1)),ApprovedHours:0,IsApproved:false},
      {Id:202,StaffId:2,ScheduledShiftId:102,ActualClockIn:iso(addHours(base,.95)),ActualClockOut:null,ApprovedHours:0,IsApproved:false}
    ],
    TrainingRecords:[
      {Id:501,StaffId:1,Name:'Manual Handling',ExpiryDate:iso(addHours(now,24*18))},
      {Id:502,StaffId:2,Name:'Medication Administration',ExpiryDate:iso(addHours(now,24*92))},
      {Id:503,StaffId:3,Name:'Safeguarding Adults',ExpiryDate:iso(addHours(now,24*41))},
      {Id:504,StaffId:1,Name:'Fire Safety',ExpiryDate:iso(addHours(now,24*11))}
    ],
    LeaveRequests:[
      {Id:301,StaffId:3,Type:'Annual Leave',Date:iso(addHours(base,120)),Status:'Pending'},
      {Id:302,StaffId:1,Type:'Sickness',Date:iso(addHours(base,48)),Status:'Logged'}
    ],
    Incidents:[
      {Id:401,Severity:'Low',Unit:'Residential',Text:'Call bell response exceeded target by 3 minutes.',Time:iso(addHours(now,-9))},
      {Id:402,Severity:'Medium',Unit:'Nursing',Text:'Medication round variance flagged for manager review.',Time:iso(addHours(now,-26))},
      {Id:403,Severity:'Low',Unit:'Dementia',Text:'Agency handover note missing signature.',Time:iso(addHours(now,-31))}
    ],
    AuditLog:[
      {Time:iso(addHours(now,-1)),Text:'Safe staffing coverage confirmed for morning shift.'},
      {Time:iso(addHours(now,-4)),Text:'Timesheet variance generated for Sarah Jenkins.'},
      {Time:iso(addHours(now,-12)),Text:'Training expiry warning issued for Fire Safety.'}
    ]
  };
  localStorage.setItem(DB_KEY,JSON.stringify(db));
}
function getDB(){return JSON.parse(localStorage.getItem(DB_KEY))}
function saveDB(db){localStorage.setItem(DB_KEY,JSON.stringify(db));render()}
function resetDemo(){localStorage.removeItem(DB_KEY);seed();currentTab='command';render();toast('Demo reset. Open Presentation Mode for the clean pitch sequence.')}
seed();

const session=document.getElementById('sessionSelect');
users.forEach(u=>session.innerHTML+=`<option>${u.name}</option>`);
session.value='Care Manager';
session.onchange=()=>{currentTab=session.value==='Care Manager'?'command':'my';render()};

function staffById(id){return getDB().Staff.find(s=>s.Id==id)}
function activeStaff(){return getDB().Staff.find(s=>s.Name===session.value)}
function tabList(){return session.value==='Care Manager'?managerTabs:staffTabs}
function setTab(tab){currentTab=tab;render()}

function roleLabel(role){
  if(role==='Nurse') return 'Registered Nurse';
  if(role==='Senior Carer') return 'Senior Carer';
  return 'Care Assistant';
}
function findShift(id){return getDB().ScheduledShifts.find(s=>s.Id==id)}

function complianceCheck(staffId,start,end,excludeId=null){
  const db=getDB();
  const ns=new Date(start), ne=new Date(end);
  if(!start||!end||isNaN(ns)||isNaN(ne)||ne<=ns) return {ok:false,msg:'Choose a valid start and end time.'};
  const shifts=db.ScheduledShifts.filter(s=>s.StaffId==staffId && s.Id!==excludeId);
  const staff=staffById(staffId);
  for(const s of shifts){
    const ss=new Date(s.StartTime), se=new Date(s.EndTime);
    if(ns<se && ne>ss){
      return {ok:false,msg:`Rejected: ${staff.Name} already has an overlapping shift at this time.`};
    }
    const restAfterPrevious=(ns-se)/MS_HOUR;
    const restBeforeNext=(ss-ne)/MS_HOUR;
    if(restAfterPrevious>=0 && restAfterPrevious<11){
      return {ok:false,msg:`Rejected: ${staff.Name} would only have ${restAfterPrevious.toFixed(1)} hours rest after the previous shift. UK daily rest rule requires 11.`};
    }
    if(restBeforeNext>=0 && restBeforeNext<11){
      return {ok:false,msg:`Rejected: ${staff.Name} would only have ${restBeforeNext.toFixed(1)} hours rest before the next shift. UK daily rest rule requires 11.`};
    }
  }
  const windowStart=new Date(ns.getTime()-7*24*MS_HOUR);
  const windowEnd=new Date(ns.getTime()+7*24*MS_HOUR);
  let total=duration(ns,ne);
  shifts.forEach(s=>{
    const ss=new Date(s.StartTime);
    if(ss>=windowStart && ss<=windowEnd) total+=duration(s.StartTime,s.EndTime);
  });
  if(total>48){
    return {ok:false,msg:`Rejected: rolling 7-day total would become ${total.toFixed(1)} hours. UK weekly working-time limit is 48.`};
  }
  return {ok:true,msg:'Accepted: no overlap, 11-hour rest preserved, and rolling 48-hour limit safe.'};
}

function coverageForUnit(unitName,day=new Date()){
  const db=getDB();
  const unit=db.Units.find(u=>u.Name===unitName);
  const shifts=db.ScheduledShifts.filter(s=>s.Unit===unitName && new Date(s.StartTime).toDateString()===day.toDateString());
  let carers=0, seniors=0, nurses=0;
  shifts.forEach(s=>{
    const st=staffById(s.StaffId);
    if(st.Role==='Nurse') nurses++;
    if(st.Role==='Senior Carer') seniors++;
    if(st.Role==='Carer' || st.Role==='Senior Carer') carers++;
  });
  const requiredCarers=Math.max(1,Math.ceil(unit.Residents/unit.RequiredCarerRatio));
  const requiredSeniors=Math.max(1,Math.ceil(unit.Residents/unit.RequiredSeniorRatio));
  const nurseOk=!unit.NurseRequired || nurses>=1;
  const carerOk=carers>=requiredCarers;
  const seniorOk=seniors>=requiredSeniors || unit.Name==='Nursing';
  const ok=carerOk && seniorOk && nurseOk;
  return {unit,carers,seniors,nurses,requiredCarers,requiredSeniors,nurseOk,carerOk,seniorOk,ok};
}

function allCoverage(){
  const db=getDB();
  return db.Units.map(u=>coverageForUnit(u.Name));
}

function aiSuggestion(){
  const db=getDB();
  const gaps=allCoverage().filter(c=>!c.ok);
  const now=new Date();
  const start=new Date(now.getFullYear(),now.getMonth(),now.getDate()+1,20,0,0);
  const end=addHours(start,8);
  let target=gaps[0] || coverageForUnit('Night Team');
  let candidates=db.Staff.map(st=>{
    const check=complianceCheck(st.Id,start,end);
    const skillMatch=st.Skills.includes(target.unit.Name) || st.Role==='Nurse' || st.Role==='Senior Carer';
    return {st,check,skillMatch,score:(check.ok?50:0)+(skillMatch?35:0)+(st.Role==='Senior Carer'?10:0)+(st.Role==='Nurse'&&target.unit.NurseRequired?15:0)};
  }).sort((a,b)=>b.score-a.score);
  const best=candidates[0];
  return {unit:target.unit.Name,start,end,best,coverage:target};
}

    <div class="glass"><h2>My Requests</h2>${db.LeaveRequests.filter(r=>r.StaffId===st.Id).map(r=>`<div class="item"><div class="item-header"><b>${r.Type}</b><span class="warn-text">${r.Status}</span></div><p>${new Date(r.Date).toLocaleDateString()}</p></div>`).join('') || '<p>No requests.</p>'}</div></section>`;
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

window.saveBranding=function(){
  const db=getDB();
  db.ClientProfile.HomeName=document.getElementById('brandHome').value || 'Care Home';
  db.ClientProfile.Location=document.getElementById('brandLocation').value || 'UK';
  db.AuditLog.unshift({Time:iso(new Date()),Text:`Client branding updated to ${db.ClientProfile.HomeName}.`});
  saveDB(db);
  toast('Client branding applied.');
};

window.addShift=function(){
  const staffId=Number(document.getElementById('newStaff').value);
  const unit=document.getElementById('newUnit').value;
  const start=document.getElementById('newStart').value;
  const end=document.getElementById('newEnd').value;
  const check=complianceCheck(staffId,start,end);
  const msg=document.getElementById('shiftMsg');
  if(!check.ok){
    msg.innerHTML=`<div class="item big-alert"><b class="bad-text">Assignment blocked</b><p>${check.msg}</p></div>`;
    toast(check.msg);
    return;
  }
  const db=getDB(), st=staffById(staffId);
  db.ScheduledShifts.push({Id:uid(),StaffId:staffId,StartTime:iso(start),EndTime:iso(end),RequiredRole:st.Role,Unit:unit,Status:'Published'});
  db.AuditLog.unshift({Time:iso(new Date()),Text:`Compliant shift assigned to ${st.Name} for ${unit}.`});
  saveDB(db);
  toast(check.msg);
};

window.simulateUnsafeShift=function(){
  const s=getDB().ScheduledShifts[0];
  document.getElementById('newStaff').value=s.StaffId;
  document.getElementById('newUnit').value=s.Unit;
  document.getElementById('newStart').value=s.StartTime.slice(0,16);
  document.getElementById('newEnd').value=s.EndTime.slice(0,16);
  document.getElementById('shiftMsg').innerHTML='<div class="item big-alert"><b class="bad-text">Unsafe scenario loaded</b><p>Click Assign Shift to show an overlap/compliance rejection.</p></div>';
};

window.loadSafeFix=function(){
  const ai=aiSuggestion();
  document.getElementById('newStaff').value=ai.best.st.Id;
  document.getElementById('newUnit').value=ai.unit;
  document.getElementById('newStart').value=ai.start.toISOString().slice(0,16);
  document.getElementById('newEnd').value=ai.end.toISOString().slice(0,16);
  document.getElementById('shiftMsg').innerHTML='<div class="item"><b class="good">Safe AI fix loaded</b><p>Click Assign Shift to close a coverage risk safely.</p></div>';
};

window.assignAISuggestion=function(){
  const ai=aiSuggestion();
  if(!ai.best.check.ok){toast(ai.best.check.msg);return}
  const db=getDB(), st=ai.best.st;
  db.ScheduledShifts.push({Id:uid(),StaffId:st.Id,StartTime:iso(ai.start),EndTime:iso(ai.end),RequiredRole:st.Role,Unit:ai.unit,Status:'Published'});
  db.AuditLog.unshift({Time:iso(new Date()),Text:`AI suggested compliant shift assigned to ${st.Name} for ${ai.unit}.`});
  saveDB(db);
  toast(`AI suggestion assigned: ${st.Name} for ${ai.unit}.`);
};

window.dragShift=function(e,id){draggedShiftId=id};
window.allowDrop=function(e){e.preventDefault()};
window.dropShift=function(e,dayIso){
  e.preventDefault();
  e.currentTarget.classList.remove('dropzone');
  if(!draggedShiftId)return;
  const db=getDB(), s=db.ScheduledShifts.find(x=>x.Id===draggedShiftId);
  const oldStart=new Date(s.StartTime), oldEnd=new Date(s.EndTime), newDay=new Date(dayIso);
  const newStart=new Date(newDay);
  newStart.setHours(oldStart.getHours(),oldStart.getMinutes(),0,0);
  const newEnd=addHours(newStart,duration(oldStart,oldEnd));
  const check=complianceCheck(s.StaffId,newStart,newEnd,s.Id);
  if(!check.ok){toast(check.msg);render();return}
  s.StartTime=iso(newStart); s.EndTime=iso(newEnd);
  db.AuditLog.unshift({Time:iso(new Date()),Text:`Shift moved safely for ${staffById(s.StaffId).Name}.`});
  draggedShiftId=null;
  saveDB(db);
  toast('Shift moved safely. Compliance checks passed.');
};

window.showShift=function(id){
  const s=findShift(id), st=staffById(s.StaffId);
  openModal('Shift Details',`<div class="item"><b>${st.Name}</b><p>${roleLabel(st.Role)}<br>${s.Unit}<br>${fmt(s.StartTime)} → ${fmt(s.EndTime)}<br>${duration(s.StartTime,s.EndTime)} hours</p></div>`);
};

window.approveTimesheet=function(id){
  const db=getDB(), t=db.TimesheetEntries.find(x=>x.Id===id);
  t.ApprovedHours=parseFloat(document.getElementById('approved_'+id).value||0);

};

window.clockIn=function(staffId,shiftId){
  const db=getDB();
  db.TimesheetEntries.push({Id:uid(),StaffId:staffId,ScheduledShiftId:shiftId,ActualClockIn:iso(new Date()),ActualClockOut:null,ApprovedHours:0,IsApproved:false});
  saveDB(db);
  toast('Clock-in recorded.');
};
window.clockOut=function(id){
  const db=getDB(), t=db.TimesheetEntries.find(x=>x.Id===id);
  t.ActualClockOut=iso(new Date());
  saveDB(db);
  toast('Clock-out recorded. Timesheet sent for approval.');
};
window.submitRequest=function(staffId){
  const db=getDB();
  const date=document.getElementById('reqDate').value;
  db.LeaveRequests.push({Id:uid(),StaffId:staffId,Type:document.getElementById('reqType').value,Date:date,Status:'Pending'});
  saveDB(db);
  toast('Request submitted to manager.');
};

function makeCSV(rows){
  return rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
}
function downloadFile(filename,content,type='text/csv'){
  const blob=new Blob([content],{type});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  toast(`${filename} downloaded.`);
}
window.downloadPayrollCSV=function(){
  const db=getDB();
  const rows=[['Staff','Role','Approved Hours','Rate','Gross Pay']];
  db.Staff.forEach(st=>{
    const hrs=db.TimesheetEntries.filter(t=>t.StaffId===st.Id && t.IsApproved).reduce((sum,t)=>sum+(t.ApprovedHours||0),0);
    rows.push([st.Name,roleLabel(st.Role),hrs,st.HourlyRate,(hrs*st.HourlyRate).toFixed(2)]);
  });
  downloadFile('careflow-payroll-export.csv',makeCSV(rows));
};
window.downloadRotaCSV=function(){
  const db=getDB();
  const rows=[['Staff','Role','Unit','Start','End','Hours','Status']];
  db.ScheduledShifts.forEach(s=>{
    const st=staffById(s.StaffId);
    rows.push([st.Name,roleLabel(st.Role),s.Unit,s.StartTime,s.EndTime,duration(s.StartTime,s.EndTime),s.Status]);
  });
  downloadFile('careflow-rota-export.csv',makeCSV(rows));
};
window.downloadTrainingCSV=function(){
  const db=getDB();
  const rows=[['Staff','Training','Expiry Date','Days Remaining','Status']];
  db.TrainingRecords.forEach(t=>{
    const st=staffById(t.StaffId), days=daysUntil(t.ExpiryDate);
    rows.push([st.Name,t.Name,t.ExpiryDate,days,days<45?'Alert':'OK']);
  });
  downloadFile('careflow-training-matrix.csv',makeCSV(rows));
};
window.downloadEvidencePack=function(){
  const db=getDB();
  const rows=[['Evidence Area','Status','Generated For'],['Safe Staffing Rota','Ready',db.ClientProfile.HomeName],['Training Matrix','Ready',db.ClientProfile.HomeName],['Medication Variance Audit','Review',db.ClientProfile.HomeName],['Incident Register','Ready',db.ClientProfile.HomeName],['Audit Trail','Ready',db.ClientProfile.HomeName]];
  downloadFile('careflow-cqc-evidence-pack.csv',makeCSV(rows));
};
window.downloadPilotProposal=function(){
  const db=getDB(), c=db.Commercials, saving=c.CurrentAgencySpend-c.OptimisedAgencySpend;
  const rows=[['Pilot Proposal',db.ClientProfile.HomeName],['Location',db.ClientProfile.Location],['Pilot Length','30 days'],['Pilot Price',c.PilotPrice],['Current Agency Spend',c.CurrentAgencySpend],['Optimised Agency Forecast',c.OptimisedAgencySpend],['Projected Monthly Saving',saving],['Annualised Saving',saving*12],['Success Metric 1','Reduce agency spend by 8-15%'],['Success Metric 2','Reduce payroll approval time by 50%'],['Success Metric 3','Make training expiry alerts visible'],['Success Metric 4','Block unsafe shifts before publishing']];
  downloadFile('careflow-pilot-proposal.csv',makeCSV(rows));
};
window.fakeExport=function(name){
  openModal(name,`<div class="item"><b class="good">${name} generated</b><p>This simulated export represents an integration-ready production action.</p></div>`);
};

function presentationSlides(){
  const db=getDB(), c=db.Commercials, saving=c.CurrentAgencySpend-c.OptimisedAgencySpend, ai=aiSuggestion();
  return [
    `<div class="slide"><span class="badge good">Opening</span><h1>${db.ClientProfile.HomeName} has three daily pressures: <span class="gradient-text">staffing gaps, compliance risk and rising agency cost.</span></h1><p>CareFlow Pro brings those risks into one operational dashboard.</p></div>`,
    `<div class="slide"><span class="badge warn">Problem</span><h1>Today, ${money(c.CurrentAgencySpend+c.PayrollLeakage)} is at risk this month.</h1><div class="grid-3"><div class="item"><b>Agency forecast</b><h2 class="bad-text">${money(c.CurrentAgencySpend)}</h2></div><div class="item"><b>Payroll leakage</b><h2 class="warn-text">${money(c.PayrollLeakage)}</h2></div><div class="item"><b>Training alerts</b><h2>${getDB().TrainingRecords.filter(t=>daysUntil(t.ExpiryDate)<45).length}</h2></div></div></div>`,
    `<div class="slide"><span class="badge bad">Compliance Demo</span><h1>Unsafe rota assignments are blocked before they become operational risk.</h1><p>Use the Smart Rota tab and click “Try unsafe shift” to show a real rejection message with the exact UK rule breach.</p><button onclick="closeModal();demoStep(2)">Run unsafe assignment demo</button></div>`,
    `<div class="slide"><span class="badge">AI Suggestion</span><h1>The system suggests a compliant fix instead of leaving the manager in a spreadsheet.</h1><div class="item"><b>${ai.best.st.Name}</b><p>${ai.unit} · ${fmt(ai.start)} → ${fmt(ai.end)}<br>${ai.best.check.msg}</p></div><button onclick="closeModal();demoStep(3)">Apply AI safe fix</button></div>`,
    `<div class="slide"><span class="badge">Payroll</span><h1>Scheduled vs actual hours are compared before payroll export.</h1><p>This reduces disputes, leakage and manual admin.</p><button onclick="closeModal();demoStep(4)">Open payroll workflow</button></div>`,
    `<div class="slide"><span class="badge good">Commercial Close</span><h1>Projected saving: <span class="gradient-text">${money(saving)}/month</span> or ${money(saving*12)}/year.</h1><p>Propose a 30-day pilot focused on agency reduction, payroll time saved and CQC evidence readiness.</p><button onclick="closeModal();demoStep(5)">Open pilot proposal</button></div>`
  ];
}
window.openPresentation=function(){
  presentationIndex=0;
  renderPresentation();
};
function renderPresentation(){
  const slides=presentationSlides();
  openModal('Presentation Mode',`${slides[presentationIndex]}
    <div class="item-header" style="margin-top:16px">
      <button class="secondary" onclick="prevSlide()" ${presentationIndex===0?'disabled':''}>Previous</button>
      <span class="muted">Slide ${presentationIndex+1} of ${slides.length}</span>
      <button onclick="nextSlide()">${presentationIndex===slides.length-1?'Finish':'Next'}</button>
    </div>`);
}
window.nextSlide=function(){
  const slides=presentationSlides();
  if(presentationIndex>=slides.length-1){closeModal();return}
  presentationIndex++;
  renderPresentation();
};
window.prevSlide=function(){if(presentationIndex>0){presentationIndex--;renderPresentation()}};

window.demoStep=function(n){
  session.value='Care Manager';
  if(n===1){currentTab='command';render();toast('Start here: staffing gaps, money at risk and next compliance risk.')}
  if(n===2){currentTab='rota';render();setTimeout(simulateUnsafeShift,100);toast('Unsafe shift loaded. Click Assign Shift to show the rejection.')}
  if(n===3){currentTab='rota';render();setTimeout(loadSafeFix,100);toast('Safe AI fix loaded. Click Assign Shift to show compliant scheduling.')}
  if(n===4){currentTab='payroll';render();toast('Approve a timesheet, then download payroll CSV.')}
  if(n===5){currentTab='proposal';render();toast('Close with the 30-day pilot and ROI case.')}
};

function openModal(title,body){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4300);
}

function render(){
  renderShell();
  const app=document.getElementById('app');
  if(session.value==='Care Manager'){
    if(!managerTabs.some(t=>t[0]===currentTab)) currentTab='command';
    app.innerHTML={
      command:commandView(),
      rota:rotaView(),
      compliance:complianceView(),
      payroll:payrollView(),
      proposal:proposalView()
    }[currentTab];
  }else{
    if(!staffTabs.some(t=>t[0]===currentTab)) currentTab='my';
    app.innerHTML={
      my:staffDashboard(),
      clock:staffClock(),
      requests:staffRequests()
    }[currentTab];
  }
}
render();
</script>
